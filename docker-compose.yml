services:
  qa-agent-workbench:
    build: .
    container_name: qa-agent-workbench
    restart: unless-stopped
    ports:
      - "${QA_PORT:-5000}:5000"
    environment:
      QA_ADMIN_USERNAME: "${QA_ADMIN_USERNAME:-admin}"
      QA_ADMIN_PASSWORD: "${QA_ADMIN_PASSWORD:?Set QA_ADMIN_PASSWORD in .env}"
      QA_ACCESS_PASSWORD: "${QA_ACCESS_PASSWORD:-}"
      QA_SECRET_KEY: "${QA_SECRET_KEY:?Set QA_SECRET_KEY in .env}"
      QA_DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
